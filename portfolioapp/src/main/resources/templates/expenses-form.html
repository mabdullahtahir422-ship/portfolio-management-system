<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Expense</title>
</head>
<body>

<h2>Add Expense</h2>

<form th:action="@{/expenses/save}" th:object="${expense}" method="post">

  <label>Company ID:</label>
  <input type="number" th:field="*{companyId}" required><br><br>

  <label>Project ID:</label>
  <input type="number" th:field="*{projectId}" required><br><br>

  <label>Expense Name:</label>
  <input type="text" th:field="*{expenseName}" required><br><br>

  <label>Amount:</label>
  <input type="text" step="0.01" th:field="*{amount}" required><br><br>

  <label>Description:</label>
  <input type="text" th:field="*{description}"><br><br>

  <button type="submit">Save</button>
</form>

<br>
<a th:href="@{/expenses}">Go To List</a>

</body>
</html>
