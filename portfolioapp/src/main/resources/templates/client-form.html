<!-- client-form.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Add Client</title></head>
<body>
<h2>Add Client</h2>
<form th:action="@{/clients/save}" th:object="${client}" method="post">
  <label>Company ID:</label>
  <input type="number" th:field="*{companyId}" placeholder="Company ID"/><br/>
  <label>Name:</label>
  <input type="text" th:field="*{clientName}" placeholder="Client Name"/><br/>
  <label>Email:</label>
  <input type="email" th:field="*{email}" placeholder="Email"/><br/>
  <label>Phone:</label>
  <input type="text" th:field="*{phone}" placeholder="Phone"/><br/>
  <button type="submit">Save Client</button>
</form>
<a th:href="@{/clients}">Back to Clients List</a>
</body>
</html>
