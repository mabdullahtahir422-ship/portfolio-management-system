
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Add Transaction</title></head>
<body>
<h2>Add Transaction</h2>
<form th:action="@{/transactions/save}" th:object="${transaction}" method="post">
  <label>ID:</label>
  <input type="number" th:field="*{id}" placeholder="Transaction ID"/><br/>
  <label>Company ID:</label>
  <input type="number" th:field="*{companyId}" placeholder="Company ID"/><br/>
  <label>Project ID:</label>
  <input type="number" th:field="*{projectId}" placeholder="Project ID"/><br/>
  <label>Amount:</label>
  <input type="number" step="0.01" th:field="*{amount}" placeholder="Amount"/><br/>
  <label>Type:</label>
  <input type="text" th:field="*{type}" placeholder="Type"/><br/>
  <label>Description:</label>
  <input type="text" th:field="*{description}" placeholder="Description"/><br/>
  <label>Date:</label>
  <input type="date" th:field="*{transactionDate}"/><br/>
  <button type="submit">Save Transaction</button>
</form>
<a th:href="@{/transactions}">Back to Transactions List</a>
</body>
</html>
