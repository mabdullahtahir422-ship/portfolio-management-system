<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Company</title>
</head>
<body>

<h2>Add Company</h2>

<form th:action="@{/companies/save}" th:object="${company}" method="post">

    <label>User ID:</label>
    <input type="number" th:field="*{userId}" placeholder="Enter User ID" required/>
    <br/><br/>

    <label>Company Name:</label>
    <input type="text" th:field="*{companyName}" placeholder="Enter Company Name" required/>
    <br/><br/>

    <label>Owner Name:</label>
    <input type="text" th:field="*{ownerName}" placeholder="Enter Owner Name" required/>
    <br/><br/>

    <label>Email:</label>
    <input type="email" th:field="*{email}" placeholder="Enter Email"/>
    <br/><br/>

    <label>Phone:</label>
    <input type="text" th:field="*{phone}" placeholder="Enter Phone"/>
    <br/><br/>

    <button type="submit">Save Company</button>

</form>

<br/>
<a th:href="@{/companies}">Back to Company List</a>

</body>
</html>
