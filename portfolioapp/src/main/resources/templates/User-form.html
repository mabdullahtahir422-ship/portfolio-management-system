<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add User</title>
</head>
<body>

<h2>Add User</h2>

<form th:action="@{/users/save}" th:object="${user}" method="post">

  <label>Name:</label>
  <input type="text" th:field="*{name}" placeholder="Enter Name" required/>
  <br/><br/>

  <label>Email:</label>
  <input type="email" th:field="*{email}" placeholder="Enter Email" required/>
  <br/><br/>

  <label>Password:</label>
  <input type="password" th:field="*{password}" placeholder="Enter Password" required/>
  <br/><br/>

  <button type="submit">Save User</button>

</form>

<br/>
<a th:href="@{/users}">Back to Users List</a>

</body>
</html>
